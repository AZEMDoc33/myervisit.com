      <stop offset="0" stop-color="#F8F3EA"/>
      <stop offset="1" stop-color="#EAF3F5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1E3A5F" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1020" cy="116" r="92" fill="#C9973A" opacity="0.15"/>
  <circle cx="160" cy="610" r="126" fill="#3D7A8A" opacity="0.12"/>

