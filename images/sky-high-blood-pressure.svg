<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Cartoon patient with high blood pressure reading</title>
  <desc id="desc">A cartoon patient looks worried while a blood pressure monitor shows a high number and an emergency physician calmly points to symptoms that matter.</desc>
  <defs>
