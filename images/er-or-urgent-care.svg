<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Cartoon signpost for urgent care or emergency department</title>
  <desc id="desc">A friendly cartoon signpost points one way to urgent care and the other way to the emergency department.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#DFF3F7"/>
      <stop offset="1" stop-color="#F7F3EE"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E0B35A"/>
      <stop offset="1" stop-color="#C9973A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1E3A5F" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#sky)"/>
  <circle cx="990" cy="130" r="82" fill="#FEFCF9" opacity="0.7"/>
  <path d="M0 538 C180 490 330 565 520 520 C720 472 925 542 1200 486 L1200 675 L0 675Z" fill="#3D7A8A" opacity="0.14"/>
  <path d="M0 585 C190 546 396 626 604 574 C815 520 1000 588 1200 545 L1200 675 L0 675Z" fill="#1E3A5F" opacity="0.12"/>

  <g transform="translate(0 0)" filter="url(#shadow)">
    <rect x="534" y="228" width="112" height="342" rx="20" fill="#7A5237"/>
    <path d="M546 246 L632 228 L632 570 L546 570Z" fill="#8D6242"/>
    <path d="M590 246 C574 302 610 342 588 398 C574 436 604 482 588 538" fill="none" stroke="#5B3A29" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    <circle cx="590" cy="320" r="10" fill="#5B3A29" opacity="0.45"/>
    <circle cx="590" cy="456" r="10" fill="#5B3A29" opacity="0.45"/>

    <path d="M176 250 H574 V386 H176 L100 318Z" fill="url(#gold)" stroke="#5B3A29" stroke-width="8" stroke-linejoin="round"/>
    <path d="M626 250 H1024 L1100 318 L1024 386 H626Z" fill="url(#gold)" stroke="#5B3A29" stroke-width="8" stroke-linejoin="round"/>
    <path d="M206 278 H530" stroke="#FEFCF9" stroke-width="8" opacity="0.38" stroke-linecap="round"/>
    <path d="M670 278 H990" stroke="#FEFCF9" stroke-width="8" opacity="0.38" stroke-linecap="round"/>

    <text x="336" y="314" text-anchor="middle" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="42" font-weight="800">URGENT CARE</text>
    <text x="336" y="360" text-anchor="middle" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="24" font-weight="700">Sick today, not scary</text>
    <text x="840" y="314" text-anchor="middle" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="38" font-weight="800">EMERGENCY</text>
    <text x="840" y="360" text-anchor="middle" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="24" font-weight="700">Chest pain? Stroke? 911.</text>
  </g>

  <g transform="translate(160 432)">
    <rect x="0" y="0" width="196" height="104" rx="20" fill="#FEFCF9" stroke="#EDE8E0" stroke-width="5"/>
    <circle cx="48" cy="52" r="24" fill="#3D7A8A"/>
    <path d="M36 52 h24 M48 40 v24" stroke="#FEFCF9" stroke-width="8" stroke-linecap="round"/>
    <text x="86" y="45" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="20" font-weight="800">Cough</text>
    <text x="86" y="74" fill="#6B7280" font-family="Arial, sans-serif" font-size="18">Sprain</text>
  </g>

  <g transform="translate(844 428)">
    <rect x="0" y="0" width="206" height="110" rx="20" fill="#FEFCF9" stroke="#EDE8E0" stroke-width="5"/>
    <circle cx="52" cy="55" r="27" fill="#DC2626"/>
    <path d="M52 38 v34 M35 55 h34" stroke="#FEFCF9" stroke-width="9" stroke-linecap="round"/>
    <text x="92" y="48" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="20" font-weight="800">Severe</text>
    <text x="92" y="78" fill="#6B7280" font-family="Arial, sans-serif" font-size="18">or scary</text>
  </g>

  <text x="600" y="630" text-anchor="middle" fill="#1E3A5F" font-family="Arial, sans-serif" font-size="26" font-weight="800">When in doubt, trust your gut and get checked.</text>
</svg>
