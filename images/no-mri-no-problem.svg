<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Cartoon patient with back pain next to an MRI machine</title>
  <desc id="desc">A humorous cartoon-style illustration of a patient holding their lower back while an emergency physician points to a checklist of red flags instead of an MRI machine.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F3EA"/>
      <stop offset="1" stop-color="#E9F2F3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1E3A5F" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="86" fill="#C9973A" opacity="0.16"/>
  <circle cx="145" cy="630" r="120" fill="#3D7A8A" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="700" y="150" width="310" height="390" rx="54" fill="#FFFFFF"/>
    <rect x="746" y="205" width="218" height="240" rx="110" fill="#DDE8EF" stroke="#1E3A5F" stroke-width="12"/>
    <ellipse cx="855" cy="325" rx="70" ry="86" fill="#F8F3EA"/>
    <rect x="773" y="475" width="164" height="24" rx="12" fill="#C9973A"/>
    <text x="855" y="575" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#1E3A5F">MRI?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="112" y="122" width="400" height="446" rx="34" fill="#FFFFFF"/>
    <rect x="154" y="170" width="316" height="58" rx="14" fill="#1E3A5F"/>
    <text x="312" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF">RED FLAG CHECK</text>
    <g font-family="Arial, sans-serif" font-size="25" fill="#1E3A5F" font-weight="700">
      <circle cx="176" cy="276" r="13" fill="#3D7A8A"/>
      <path d="M168 276l6 7 13-17" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="206" y="285">Weakness?</text>
      <circle cx="176" cy="344" r="13" fill="#3D7A8A"/>
      <path d="M168 344l6 7 13-17" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="206" y="353">Fever?</text>
      <circle cx="176" cy="412" r="13" fill="#3D7A8A"/>
      <path d="M168 412l6 7 13-17" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="206" y="421">Trauma?</text>
      <circle cx="176" cy="480" r="13" fill="#3D7A8A"/>
      <path d="M168 480l6 7 13-17" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="206" y="489">Bladder changes?</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <ellipse cx="540" cy="615" rx="190" ry="32" fill="#1E3A5F" opacity="0.18"/>
    <path d="M461 371c-28 8-54 33-61 71l-20 105h232l-16-101c-8-51-54-88-105-80z" fill="#3D7A8A"/>
    <path d="M503 354c-70 12-105 65-93 128 11 61 68 96 139 84 68-12 107-63 96-126-11-64-73-98-142-86z" fill="#F2C29B"/>
    <path d="M443 409c26-62 108-78 160-44 31 20 43 47 45 85-36-33-91-35-139-21-31 9-49 4-66-20z" fill="#6B3F2A"/>
    <circle cx="504" cy="459" r="9" fill="#1F2937"/>
    <circle cx="585" cy="456" r="9" fill="#1F2937"/>
    <path d="M519 515c28 20 62 15 84-10" fill="none" stroke="#1F2937" stroke-width="8" stroke-linecap="round"/>
    <path d="M470 573c13-45 39-75 76-91" fill="none" stroke="#1E3A5F" stroke-width="18" stroke-linecap="round"/>
    <path d="M650 534c-43 2-71 22-86 60" fill="none" stroke="#1E3A5F" stroke-width="18" stroke-linecap="round"/>
    <path d="M356 441c-34 40-40 88-16 135" fill="none" stroke="#F2C29B" stroke-width="32" stroke-linecap="round"/>
    <path d="M676 435c34 32 52 72 48 120" fill="none" stroke="#F2C29B" stroke-width="32" stroke-linecap="round"/>
    <path d="M667 414c-42 33-76 86-84 152" fill="none" stroke="#C9973A" stroke-width="16" stroke-linecap="round" stroke-dasharray="22 24"/>
  </g>

  <g>
    <rect x="376" y="72" width="448" height="88" rx="44" fill="#1E3A5F"/>
    <text x="600" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF">No MRI? No Problem.</text>
  </g>
</svg>
