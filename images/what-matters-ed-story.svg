  <g filter="url(#shadow)">
    <rect x="516" y="74" width="512" height="80" rx="40" fill="#1E3A5F"/>
    <text x="772" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#FFFFFF">Short. Clear. Helpful.</text>
