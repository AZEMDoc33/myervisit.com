    <rect x="826" y="320" width="48" height="10" rx="5" fill="#D9E4E7"/>

    <path d="M634 414c-42 22-72 69-74 126l-3 70h248l-4-72c-4-74-58-133-128-133-14 0-27 3-39 9z" fill="#FFFFFF"/>
