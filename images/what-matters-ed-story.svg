    <path d="M604 329c10-73 78-108 141-70 31 19 47 48 49 84-38-26-76-32-114-22-30 8-51 9-76 8z" fill="#6B3F2A"/>
    <circle cx="654" cy="350" r="8" fill="#1F2937"/>
