    <rect x="598" y="184" width="352" height="262" rx="30" fill="#FFFFFF"/>
    <rect x="638" y="224" width="130" height="86" rx="16" fill="#E9F2F3"/>
    <path d="M665 270h22l16-26 24 44 17-18h36" fill="none" stroke="#3D7A8A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="804" y="224" width="106" height="158" rx="16" fill="#F8F3EA"/>
    <rect x="826" y="252" width="62" height="10" rx="5" fill="#C9973A"/>
