<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Patient telling a focused emergency department story</title>
  <desc id="desc">A cartoon emergency physician listens while a patient shares the key parts of their medical story: symptom, timing, changes, history, and medications.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F3EA"/>
      <stop offset="1" stop-color="#E9F2F3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1E3A5F" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1015" cy="110" r="92" fill="#C9973A" opacity="0.15"/>
  <circle cx="148" cy="618" r="128" fill="#3D7A8A" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="80" y="92" width="400" height="476" rx="38" fill="#FFFFFF"/>
    <rect x="124" y="142" width="312" height="58" rx="14" fill="#1E3A5F"/>
    <text x="280" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="900" fill="#FFFFFF">THE USEFUL VERSION</text>
    <g font-family="Arial, sans-serif" font-size="24" fill="#1E3A5F" font-weight="700">
      <circle cx="150" cy="258" r="13" fill="#3D7A8A"/>
      <path d="M142 258l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="267">Main symptom</text>
      <circle cx="150" cy="324" r="13" fill="#3D7A8A"/>
      <path d="M142 324l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="333">When it started</text>
      <circle cx="150" cy="390" r="13" fill="#3D7A8A"/>
      <path d="M142 390l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="399">What changed</text>
      <circle cx="150" cy="456" r="13" fill="#3D7A8A"/>
      <path d="M142 456l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="465">Relevant history</text>
      <circle cx="150" cy="522" r="13" fill="#3D7A8A"/>
      <path d="M142 522l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="531">Key medications</text>
    </g>
  </g>

