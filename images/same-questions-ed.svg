    <path d="M440 178l-24 48 68-48z" fill="#FFFFFF"/>
    <text x="600" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="46" font-weight="900" fill="#1E3A5F">What brings you in today?</text>
  </g>

