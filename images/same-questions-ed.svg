<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Emergency department team asking the same question</title>
  <desc id="desc">A warm cartoon-style illustration of registration, a nurse, and an emergency physician all asking a patient what brings them in today.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F3EA"/>
      <stop offset="1" stop-color="#E9F2F3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1E3A5F" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="88" fill="#C9973A" opacity="0.15"/>
  <circle cx="150" cy="620" r="125" fill="#3D7A8A" opacity="0.12"/>

