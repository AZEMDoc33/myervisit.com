    <path d="M612 430h205l18 168H585z" fill="#3D7A8A" opacity="0.18"/>
    <circle cx="700" cy="304" r="88" fill="#F2C29B"/>
    <path d="M617 302c9-76 78-116 145-82 34 18 54 46 60 86-36-22-76-30-116-22-40 8-64 11-89 18z" fill="#6B3F2A"/>
    <circle cx="672" cy="320" r="8" fill="#1F2937"/>
