<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Emergency physician building trust with a patient</title>
  <desc id="desc">A warm cartoon-style illustration of an emergency physician sitting with a patient, introducing himself, and explaining the plan of care.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F3EA"/>
      <stop offset="1" stop-color="#E9F2F3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1E3A5F" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="90" fill="#C9973A" opacity="0.15"/>
  <circle cx="170" cy="612" r="126" fill="#3D7A8A" opacity="0.13"/>

  <g filter="url(#shadow)">
    <rect x="88" y="98" width="330" height="430" rx="38" fill="#FFFFFF"/>
    <rect x="130" y="148" width="246" height="54" rx="14" fill="#1E3A5F"/>
    <text x="253" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">CARE PLAN</text>
    <g font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#1E3A5F">
      <circle cx="150" cy="260" r="13" fill="#3D7A8A"/>
      <path d="M142 260l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="269">Use your name</text>
