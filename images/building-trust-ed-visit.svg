      <path d="M142 326l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="335">Sit and listen</text>
      <circle cx="150" cy="392" r="13" fill="#3D7A8A"/>
      <path d="M142 392l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="401">Explain the plan</text>
      <circle cx="150" cy="458" r="13" fill="#3D7A8A"/>
      <path d="M142 458l6 7 14-18" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="182" y="467">Safe discharge</text>
    </g>
  </g>

  <g filter="url(#shadow)">
